name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip wheel . -w /tmp/flowtrim-wheelhouse
          python -m pip install /tmp/flowtrim-wheelhouse/flowtrim-*.whl

      - name: Skill installer smoke
        run: |
          node scripts/flowtrim-skill-install.mjs --help
          node scripts/flowtrim-skill-install.mjs --agent codex --scope project --project /tmp/flowtrim-install-smoke --dry-run

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: CLI smoke
        run: |
          test "$(flowtrim-benchmark abcd)" = "1"
          test "$(flowtrim-classify "npm test produced a long build log")" = "command-output"

      - name: Synthetic benchmark smoke
        run: |
          flowtrim-benchmark suite --profile synthetic-heavy --format json > /tmp/flowtrim-synthetic.json
          flowtrim-benchmark suite --profile public-playground-readonly --format json > /tmp/flowtrim-playground.json

      - name: Privacy, docs, skill, and corpus gates
        run: |
          flowtrim-benchmark privacy-scan --tracked --path /tmp/flowtrim-synthetic.json --path /tmp/flowtrim-playground.json --format json
          flowtrim-benchmark skill-check --skill-root skills/flowtrim --format json
          flowtrim-benchmark docs-check --format json
          flowtrim-benchmark public-corpus audit --manifest benchmarks/public-corpus/manifest.v1.json --format json
          flowtrim-benchmark doctor --format json
          flowtrim-benchmark install-check --format json

      - name: Claim gates
        run: |
          flowtrim-benchmark claim-check --report /tmp/flowtrim-synthetic.json --claim "FlowTrim selected a safe lower-token method for this measured lane." --format json
          if flowtrim-benchmark claim-check --report /tmp/flowtrim-synthetic.json --claim "FlowTrim beats RTK, Ponytail, and Headroom globally." --format json; then
            exit 1
          fi
